version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 + pgvector extension
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medocr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medocr_db
      POSTGRES_USER: medocr_user
      POSTGRES_PASSWORD: medocr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medocr_user -d medocr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 — Celery broker + result backend
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medocr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: medocr_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/artifacts/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: bash -c "pip install mlflow==2.15.1 --quiet && rm -f /mlflow/artifacts/mlflow.db && mlflow server --backend-store-uri sqlite:////mlflow/artifacts/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts:
